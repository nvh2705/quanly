{% extends "base.html" %}
{% block content %}

<div class="container-fluid mt-4">

    <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">
                <i class="fas fa-comments me-2"></i> Quản lý chat
            </h5>
        </div>

        <div class="card-body">

            {% for msg in messages %}
            {% if not msg.reply_to %}
            <div class="chat-box mb-4 p-3">

                <!-- USER -->
                <div class="chat-user">
                    <strong>{{ msg.sender }} ({{ msg.role }})</strong>
                    <p class="mb-2">{{ msg.content }}</p>
                </div>

                <!-- ADMIN REPLY -->
                {% for r in messages if r.reply_to == msg.id %}
                <div class="chat-admin">
                    <small>Admin:</small><br>
                    {{ r.content }}
                </div>
                {% endfor %}

                <!-- FORM REPLY -->
                <form method="POST" action="{{ url_for('reply_message', msg_id=msg.id) }}" class="mt-3 d-flex gap-2">
                    <input name="reply" class="form-control" placeholder="Trả lời..." required>
                    <button class="btn btn-success">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>

            </div>
            {% endif %}
            {% endfor %}

        </div>
    </div>

</div>

{% endblock %}
